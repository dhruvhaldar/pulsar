<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pulsar Workbench</title>
    <link rel="stylesheet" href="clay.css?v=2">
    <link rel="stylesheet" href="style.css?v=2">

    <!-- Dependencies -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <!-- Three.js Background -->
    <div id="space-bg"></div>

    <div class="container">
        <!-- Header -->
        <header class="clay-panel header-panel">
            <h1>Pulsar ✨</h1>
            <p>System Identification and Physical Modeling</p>
        </header>

        <div class="main-grid">
            <!-- Sidebar / Workbench Tools -->
            <div class="clay-panel tools-panel">
                <h2>1. Physical Modeling</h2>
                <div id="workbench-area" class="clay-inset"></div>
                <button class="clay-button" onclick="simulateSystem()">Simulate Model</button>
            </div>

            <!-- Data Upload & Identification -->
            <div class="clay-panel identify-panel">
                <h2>2. Data-Driven Identification (ARX)</h2>
                <div class="file-upload clay-inset">
                    <input type="file" id="csv-upload" accept=".csv" />
                    <label for="csv-upload" style="margin-bottom: 10px; font-weight: bold;">Upload CSV (time, u, y)</label>
                    <span style="font-size: 0.9em; margin-bottom: 10px; color: var(--dark-text-color);">OR</span>
                    <button class="clay-button" style="padding: 0.5rem 1rem; font-size: 0.9rem;" onclick="useSampleData()">Use Sample Data</button>
                </div>
                <div class="arx-params">
                    <label>na: <input type="number" id="na" value="2" class="clay-input"></label>
                    <label>nb: <input type="number" id="nb" value="2" class="clay-input"></label>
                    <label>nk: <input type="number" id="nk" value="1" class="clay-input"></label>
                </div>
                <button class="clay-button" onclick="identifySystem()">Estimate ARX</button>
            </div>
        </div>

        <!-- Charts Grid -->
        <div class="charts-grid">
            <div class="clay-panel chart-container">
                <h3>Bode Plot (Magnitude)</h3>
                <div class="chart-wrapper">
                    <canvas id="bodeMagChart"></canvas>
                </div>
            </div>
            <div class="clay-panel chart-container">
                <h3>Bode Plot (Phase)</h3>
                <div class="chart-wrapper">
                    <canvas id="bodePhaseChart"></canvas>
                </div>
            </div>
            <div class="clay-panel chart-container">
                <h3>Validation (Residual Autocorrelation)</h3>
                <div class="chart-wrapper">
                    <canvas id="validationChart"></canvas>
                </div>
            </div>
            <div class="clay-panel chart-container">
                <h3>Time Series (Simulation/Fit)</h3>
                <div class="chart-wrapper">
                    <canvas id="timeSeriesChart"></canvas>
                </div>
            </div>
        </div>

        <footer style="margin-top: 2rem; text-align: center; color: var(--dark-text-color); padding: 1rem 0;">
            &copy; 2026 <a href="https://dhruvhaldar.vercel.app/" target="_blank" rel="noopener noreferrer" style="color: #558711; font-weight: bold; text-decoration: none;">Dhruv Haldar</a>. MIT License. | <a href="https://github.com/dhruvhaldar/horizon" target="_blank" rel="noopener noreferrer" aria-label="GitHub repository (opens in a new tab)" style="color: #558711; font-weight: bold; text-decoration: none;">GitHub</a>
        </footer>
    </div>

    <!-- Scripts -->
    <script src="three_bg.js?v=2"></script>
    <script src="script.js?v=2"></script>
</body>
</html>
